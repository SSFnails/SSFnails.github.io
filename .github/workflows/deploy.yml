name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
        env:
          # публичные ключи, секретов здесь нет
          VITE_SUPABASE_URL: https://hmcyumxfbhffavanxkdt.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_KPqGK0sF1R3DR09fYoLeig_Ed8GpyZf
      # запасная страница для роутинга одностраничника, и /book как настоящая страница
      - run: cp dist/index.html dist/404.html && cp dist/index.html dist/book.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
